name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: linux-appimage
            exec_name: GestorCalificacionesAules-x86_64.AppImage
          - os: windows-latest
            artifact_name: windows-exe
            exec_name: Gestor_Calificaciones_Aules.exe
          - os: macos-latest
            artifact_name: macos-dmg
            exec_name: GestorCuadernoAules.dmg

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller customtkinter packaging Pillow

      - name: Build Linux (AppImage)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y libfuse2 file desktop-file-utils appstream wget
          wget -O appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          pyinstaller --noconsole --name "GestorCalificacionesAules" --collect-all customtkinter gui_aules.py
          mkdir -p AppDir/usr/bin
          cp -r dist/GestorCalificacionesAules/* AppDir/usr/bin/
          # Setup AppDir minimal structure
          cat > AppDir/GestorCalificacionesAules.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Gestor Calificaciones Aules
          Exec=GestorCalificacionesAules
          Icon=GestorCalificacionesAules
          Categories=Education;
          EOF
          touch AppDir/GestorCalificacionesAules.png
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="${HERE}/usr/bin:${PATH}"
          exec "${HERE}/usr/bin/GestorCalificacionesAules" "$@"
          EOF
          chmod +x AppDir/AppRun
          ARCH=x86_64 ./appimagetool AppDir ${{ matrix.exec_name }}

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --clean --onefile --windowed --name "Gestor_Calificaciones_Aules" --collect-all customtkinter gui_aules.py

      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onefile --noconsole --name "GestorCalificacionesAules" --collect-all customtkinter gui_aules.py
          # Firma ad-hoc para evitar algunos bloqueos de ejecución en macOS
          codesign --force --deep --sign - "dist/GestorCalificacionesAules"
          mkdir -p dmg_root
          cp dist/GestorCalificacionesAules dmg_root/
          hdiutil create -volname "GestorCuadernoAules" -srcfolder dmg_root -ov -format UDZO ${{ matrix.exec_name }}

      - name: Generate Checksums
        shell: bash
        run: |
          # Si el archivo está en dist/ (Windows), lo movemos a la raíz para unificar
          if [ -f "dist/${{ matrix.exec_name }}" ]; then
            mv "dist/${{ matrix.exec_name }}" .
          fi
          # Generar el hash del archivo que ahora está en la raíz (limpiando el asterisco de Windows)
          sha256sum "${{ matrix.exec_name }}" | sed 's/\*//' > "${{ matrix.exec_name }}.sha256"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.exec_name }}
            ${{ matrix.exec_name }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare Release Files
        run: |
          mkdir release_assets
          find . -name "*.AppImage" -exec cp {} release_assets/ \;
          find . -name "*.exe" -exec cp {} release_assets/ \;
          find . -name "*.dmg" -exec cp {} release_assets/ \;
          find . -name "*.sha256" -exec cp {} release_assets/ \;
          
          # Crear el cuerpo de la Release de forma robusta
          echo "# 🚀 Gestión de Calificaciones Aules ${{ github.ref_name }}" > release_assets/body.md
          echo "" >> release_assets/body.md
          echo "Herramienta multiplataforma profesional para la sincronización inteligente y gestión del libro de calificaciones en Aules (Moodle)." >> release_assets/body.md
          echo "" >> release_assets/body.md
          echo "## 📦 Descargas por Plataforma" >> release_assets/body.md
          echo "" >> release_assets/body.md
          echo "| Plataforma | Archivo | Instrucciones de Ejecución |" >> release_assets/body.md
          echo "| :--- | :--- | :--- |" >> release_assets/body.md
          echo "| **Windows** | \`.exe\` | Haz doble clic para iniciar la interfaz gráfica. |" >> release_assets/body.md
          echo "| **Linux** | \`.AppImage\` | Dale permisos de ejecución (\`chmod +x\`) y ejecútalo. |" >> release_assets/body.md
          echo "| **macOS** | \`.dmg\` | Abre el disco y haz **Botón Derecho > Abrir**. Si se bloquea, ve a **Ajustes del Sistema > Privacidad y seguridad** y pulsa en **\"Abrir igualmente\"**. |" >> release_assets/body.md
          echo "" >> release_assets/body.md
          echo "## 📚 Documentación" >> release_assets/body.md
          echo "- [Guía de Usuario (README.md)](https://github.com/${{ github.repository }}/blob/main/README.md)" >> release_assets/body.md
          echo "- [Manual Técnico (README_TECNICO.md)](https://github.com/${{ github.repository }}/blob/main/README_TECNICO.md)" >> release_assets/body.md
          echo "" >> release_assets/body.md
          echo "---" >> release_assets/body.md
          echo "### 🔒 Verificación de Integridad (SHA-256)" >> release_assets/body.md
          echo "\`\`\`text" >> release_assets/body.md
          
          cd release_assets
          cat *.sha256 >> body.md
          echo "\`\`\`" >> body.md
          cat *.sha256 > SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release_assets/*
          body_path: release_assets/body.md
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
